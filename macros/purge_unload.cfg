# ======================================================================
# ------------------------- PURGE AND UNLOAD ---------------------------
# ======================================================================
# File: macros/purge_unload.cfg
# Description: Heats up, purges, and unloads filament, leaving the 
#              hotend hot for a nozzle change.
# ======================================================================

[gcode_macro PURGE_AND_UNLOAD]
description: Heats up, purges, and unloads filament, leaving the hotend hot for a nozzle change.
gcode:
    # --- 1. Define Variables ---
    # Set default temp to 230C, but allow user to specify (e.g., TEMP=240)
    {% set TEMP = params.TEMP|default(230)|float %}
    
    # --- 2. Heat Up the Hotend ---
    M117 Heating for swap...
    M104 S{TEMP}
    M109 S{TEMP}
    
    # --- 3. Set Extruder to Relative Positioning ---
    M83
    
    # --- 4. Purge (Melt Tip and Push Out Old Filament) ---
    M117 Purging...
    G1 E15 F300
    
    # --- 5. Rapid Retract (Break String Cleanly) ---
    M117 Retracting...
    G1 E-15 F2000
    
    # --- 6. Slow Retract (Pull Clear of Extruder Gears) ---
    G1 E-60 F1000
    
    # --- 7. Final Alerts ---
    # Keep hotend heated for the physical swap (CRITICAL)
    M117 Ready for nozzle swap! Keep hotend HOT.

# ======================================================================