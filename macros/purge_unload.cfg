[gcode_macro PURGE_AND_UNLOAD]
description: Heats up, purges, and unloads filament, leaving the hotend hot for a nozzle change.
gcode:
    # Set default temp to 230C, but allow user to specify (e.g., UNLOAD_FOR_NOZZLE_SWAP TEMP=240)
    {% set TEMP = params.TEMP|default(230)|float %}
    
    # 1. Heat up the hotend
    M117 Heating for swap...
    M104 S{TEMP}
    M109 S{TEMP}
    
    # 2. Set extruder to relative positioning
    M83
    
    # 3. Purge to melt the tip and push out old filament
    M117 Purging...
    G1 E15 F300
    
    # 4. Rapid retract to break the string cleanly from the melt zone
    M117 Retracting...
    G1 E-15 F2000
    
    # 5. Long, slower retract to pull the filament clear of the extruder gears
    G1 E-60 F1000
    
    # 6. Keep hotend heated for the physical swap (CRITICAL)
    M117 Ready for nozzle swap! Keep hotend HOT.