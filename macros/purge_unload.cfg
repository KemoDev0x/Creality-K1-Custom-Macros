# ======================================================================
# ---------------------- UNLOAD FOR NOZZLE SWAP ------------------------
# ======================================================================
# File: macros/purge_unload.cfg
# Description: Shapes the tip, purges, and fully unloads filament for 
#              a nozzle change.
# ======================================================================

[gcode_macro UNLOAD_FOR_NOZZLE_SWAP]
description: Shapes the tip, purges, and fully unloads filament for a nozzle change.
gcode:
    # --- 1. Define Variables ---
    {% set TEMP = params.TEMP|default(230)|float %}
    
    # --- 2. Heat Up the Hotend ---
    M117 Heating for swap...
    M104 S{TEMP}
    M109 S{TEMP}
    
    # --- 3. Set Extruder to Relative Positioning ---
    M83
    
    # --- 4. Purge (Melt Tip and Push Out Old Filament) ---
    M117 Purging and shaping tip...
    G1 E15 F300
    
    # --- 5. Rapid Retract (Tip Shaping Part 1 - Break String Cleanly) ---
    G1 E-15 F3000
    
    # --- 6. Dwell/Pause (Tip Shaping Part 2 - Let Tip Cool) ---
    # This prevents the molten plastic from forming a "bulb" in the heatbreak
    G4 P2000
    
    # --- 7. Slow Retract (Fully Clear Extruder Gears and PTFE Tube) ---
    M117 Extracting filament...
    G1 E-70 F1000
    
    # --- 8. Final Alerts ---
    # Keep hotend heated for the physical swap
    M117 Ready for nozzle swap! Keep hotend HOT.

# ======================================================================