# ======================================================================
# --------------------------- CUSTOM MACROS ----------------------------
# ======================================================================
# Description: User-defined macros for preheating, timing, and alerts.
# ======================================================================

[gcode_macro PREHEAT_TIMER]
description: Preheats bed to 50C, hotend to 150C, and beeps after 10 minutes.
gcode:
    # --- 1. Set Temperatures Asynchronously ---
    # Using M140/M104 prevents Klipper from locking up the command queue
    M140 S50   # Set bed target to 50C
    M104 S150  # Set hotend target to 150C

    # --- 2. Update UI Display ---
    M117 Preheating to 50C/150C for 10 minutes. 
    
    # --- 3. Start Background Timer ---
    # Trigger the delayed G-code timer (600 seconds = 10 minutes)
    UPDATE_DELAYED_GCODE ID=_PREHEAT_BEEPER DURATION=600    


# ----------------------------------------------------------------------


[delayed_gcode _PREHEAT_BEEPER]
# Note: This macro is hidden from the web UI due to the '_' prefix
gcode:
    # --- 1. Trigger Audio Alerts ---
    BEEP
    G4 P2000  # Wait 2 seconds for beep.mp3 to finish playing
    BEEP
    G4 P2000  # Wait 2 seconds to prevent ALSA audio crash
    BEEP      # Final beep

    # --- 2. Update UI Display ---
    M117 10 Minutes Up! Printer warmed up and ready.  


# ----------------------------------------------------------------------


[gcode_macro CANCEL_PREHEAT_TIMER]
description: Cancels the preheat background timer and turns off heaters.
gcode:
    # --- 1. Turn Off Heaters ---
    M140 S0   # Turn off bed
    M104 S0   # Turn off hotend
    
    # --- 2. Stop Background Timer ---
    # Stop the delayed G-code timer by setting duration to 0
    UPDATE_DELAYED_GCODE ID=_PREHEAT_BEEPER DURATION=0
    
    # --- 3. Update UI Display ---
    M117 Preheat Cancelled.

# ======================================================================