# ======================================================================
# -------------------------- M117 OVERRIDE -----------------------------
# ======================================================================
# File: custom_macros/M117_override.cfg
# Description: Hijacks the default M117 (Set LCD Message) G-code command. 
#              It preserves the native UI pop-up, but forces Klipper to 
#              simultaneously echo the message into the Fluidd console.
#              This captures Slicer layer updates in the terminal history.
#
# Dependency: Requires the [respond] module to be enabled in printer.cfg.
# ======================================================================

[gcode_macro M117]
rename_existing: M117.1
gcode:
    # --- 1. Send to UI Display ---
    # Executes the original native behavior (M117.1)
    M117.1 {rawparams}
    
    # --- 2. Echo to Terminal Console ---
    # Pushes the exact same text to the Fluidd/Mainsail history
    RESPOND MSG="{rawparams}"

# ======================================================================