# ======================================================================
# --------------------------- CUSTOM MACROS ----------------------------
# ======================================================================
# Description: User-defined macros for preheating, timing, and alerts
# ======================================================================

[gcode_macro PREHEAT_TIMER]
description: Preheat with custom temps/time. Usage: PREHEAT_TIMER BED=50 HOTEND=150 TIME=10 BEEPS=2
variable_beeps: 2  
gcode:
    # --- 1. Define Variables and Fallback Defaults ---
    {% set BED_TEMP = params.BED|default(50)|int %}
    {% set HOTEND_TEMP = params.HOTEND|default(150)|int %}
    {% set TIME_MINS = params.TIME|default(10)|int %}
    {% set BEEP_COUNT = params.BEEPS|default(2)|int %}

    # --- 2. Convert Minutes to Seconds ---
    {% set TIME_SECS = TIME_MINS * 60 %}

    # --- 3. Set Temperatures Asynchronously ---
    M140 S{BED_TEMP}   # Set bed target
    M104 S{HOTEND_TEMP}  # Set hotend target

    # --- 4. Store Beep Count in THIS Macro ---
    SET_GCODE_VARIABLE MACRO=PREHEAT_TIMER VARIABLE=beeps VALUE={BEEP_COUNT}

    # --- 5. Update UI Display ---
    M117 Preheating to {BED_TEMP}C/{HOTEND_TEMP}C for {TIME_MINS} minutes. 
    
    # --- 6. Start Background Timer ---
    UPDATE_DELAYED_GCODE ID=_PREHEAT_BEEPER DURATION={TIME_SECS}    

# ----------------------------------------------------------------------

[delayed_gcode _PREHEAT_BEEPER]
# Note: Hidden from UI due to the '_' prefix
gcode:
    # --- 1. Fetch the Beep Count from the Main Macro ---
    {% set beep_count = printer["gcode_macro PREHEAT_TIMER"].beeps | int %}

    # --- 2. Trigger Audio Alerts via Loop ---
    {% for i in range(beep_count) %}
        BEEP
        G4 P2000  # Wait 2 seconds for beep.mp3 to finish playing / prevent ALSA crash
    {% endfor %}

    # --- 3. Update UI Display ---
    M117 Timer Complete! Printer warmed up and ready.  

# ----------------------------------------------------------------------

[gcode_macro CANCEL_PREHEAT_TIMER]
description: Cancels the preheat background timer and turns off heaters.
gcode:
    # --- 1. Turn Off Heaters ---
    M140 S0   # Turn off bed
    M104 S0   # Turn off hotend

    # --- 2. Stop Background Timer ---
    UPDATE_DELAYED_GCODE ID=_PREHEAT_BEEPER DURATION=0
    
    # --- 3. Update UI Display ---
    M117 Preheat Cancelled.

# ======================================================================