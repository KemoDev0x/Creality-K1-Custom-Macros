# ======================================================================
# -------------------- DYNAMIC UNLOAD FILAMENT -------------------------
# ======================================================================
# Description: Highly parameterized filament unload macro for dynamic 
#              tuning across different materials and toolheads.
# ======================================================================

[gcode_macro UNLOAD_FILAMENT]
description: Shapes the tip, purges, and unloads filament using dynamic parameters.
gcode:
    # --- 1. Parameter Definitions & Defaults ---
    # Hotend target temperature
    {% set TEMP = params.TEMP|default(210)|float %}
    
    # Purge (normalization) distance and speed
    {% set PURGE_DIST = params.PURGE_DIST|default(15)|float %}
    {% set PURGE_SPEED = params.PURGE_SPEED|default(300)|float %}
    
    # Snap retract (tip shaping) distance and speed
    {% set SNAP_DIST = params.SNAP_DIST|default(15)|float %}
    {% set SNAP_SPEED = params.SNAP_SPEED|default(3000)|float %}
    
    # Cooling dwell time in milliseconds
    {% set DWELL_TIME = params.DWELL_TIME|default(2000)|int %}
    
    # Final extraction distance and speed (70mm is typical for Direct Drive)
    {% set EXTRACT_DIST = params.EXTRACT_DIST|default(70)|float %}
    {% set EXTRACT_SPEED = params.EXTRACT_SPEED|default(1000)|float %}
    
    # Cooldown toggle: 1 = Turn off heater, 0 = Keep heater on
    {% set COOLDOWN = params.COOLDOWN|default(1)|int %}

    # --- 2. Heat Up the Hotend ---
    M117 Heating for unload ({TEMP}C)...
    M104 S{TEMP}
    M109 S{TEMP}
    
    # --- 3. Set Extruder to Relative Positioning ---
    M83
    
    # --- 4. Purge (Melt Tip and Normalize Pressure) ---
    M117 Purging {PURGE_DIST}mm...
    G1 E{PURGE_DIST} F{PURGE_SPEED}
    
    # --- 5. Rapid Retract (Tip Shaping Part 1) ---
    G1 E-{SNAP_DIST} F{SNAP_SPEED}
    
    # --- 6. Dwell/Pause (Tip Shaping Part 2) ---
    G4 P{DWELL_TIME}
    
    # --- 7. Long Retract (Clear the Extruder/PTFE) ---
    M117 Extracting {EXTRACT_DIST}mm...
    G1 E-{EXTRACT_DIST} F{EXTRACT_SPEED}
    
    # --- 8. Conditional Cool Down ---
    {% if COOLDOWN == 1 %}
        M117 Cooling down hotend...
        M104 S0
    {% else %}
        M117 Maintaining {TEMP}C for next load...
    {% endif %}
    
    # --- 9. Completion Alert ---
    M117 Unload complete!
